; LANCommander Interposer Configuration
; Place this file in the same directory as LANCommander.Interposer.dll
;
; -------------------------------------------------------------------------
; [Settings]
;
;   LogFile     - Path to the access log. Supports %ENVVAR% expansion.
;                 Append-only; a session header is written each time the DLL loads.
;                 Leave empty (or remove the key) to disable all logging.
;
;   LogFiles    - 1 to log file open/attribute operations, 0 to disable.
;
;   LogRegistry - 1 to log registry open/read/write/delete operations, 0 to disable.
;
; -------------------------------------------------------------------------
[Settings]
LogFile=%TEMP%\interposer.log
LogFiles=1
LogRegistry=1

; -------------------------------------------------------------------------
; [FileRedirects]
;
; Redirect file paths at the CreateFile / GetFileAttributes level.
; Each line has the form:
;
;   Pattern=Replacement
;
; Pattern     : ECMAScript regular expression matched against the full file
;               path (case-insensitive). Use \\ for a literal backslash.
;               The first matching rule wins.
;
; Replacement : Target path.  Supports:
;               - $1 .. $9   for regex capture groups
;               - %ENVVAR%   expanded after capture-group substitution
;
; Examples:
;
;   Redirect a game's local save folder to %APPDATA%:
;   C:\\Games\\MyGame\\Saves\\(.+)=%APPDATA%\MyGame\Saves\$1
;
;   Redirect a hard-coded config path to a portable location:
;   C:\\Program Files.*\\MyGame\\config\.ini=%APPDATA%\MyGame\config.ini
;
; -------------------------------------------------------------------------
[FileRedirects]
; (add redirect rules here)

; -------------------------------------------------------------------------
; [FastDL]
;
;   Enabled           - 1 to enable FastDL downloads, 0 to disable (default).
;
;   BaseUrl           - Root URL of the FastDL HTTP server. A trailing slash
;                       is required. Supports http:// and https://.
;
;   LogDownloads      - 1 to log all download attempts to the main log file,
;                       0 to disable (default 1).
;
;   AllowedExtensions - Comma-separated list of file extensions to allow for
;                       download (e.g. .pk3,.bsp,.wav). Leading dot is
;                       optional. Leave empty to allow all file types.
;
; -------------------------------------------------------------------------
[FastDL]
Enabled=0
BaseUrl=http://fastdl.example.com/
LogDownloads=1
AllowedExtensions=

; -------------------------------------------------------------------------
; [FastDLPaths]
;
; Maps local directory prefixes to URL sub-paths under BaseUrl. Only files
; beneath a configured prefix are eligible for FastDL. The format is:
;
;   LocalPath=RemoteSubPath
;
; LocalPath    : Absolute path to a local directory. Files inside it will be
;               checked against the server. A trailing backslash is optional.
;
; RemoteSubPath: Sub-path appended to BaseUrl before the relative file path.
;               Leave empty to map directly under BaseUrl.
;
; Example (Quake 3 custom content):
;   C:\Games\Quake3\baseq3=baseq3
;
; With the example above a request for:
;   C:\Games\Quake3\baseq3\maps\q3dm1.bsp
; would fetch:
;   http://fastdl.example.com/baseq3/maps/q3dm1.bsp
;
; -------------------------------------------------------------------------
[FastDLPaths]
; (add path mappings here)
